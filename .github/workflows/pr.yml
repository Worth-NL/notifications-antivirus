name: PR

# little reset comment

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}.${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE: ghcr.io/worth-nl/notifynl-antivirus

jobs:
  unit-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    env:
      ANTIVIRUS_MODE: "NETWORK"

    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Amsterdam"

      - uses: actions/checkout@v4

      - uses: gerlero/apt-install@v1
        with:
          packages: build-essential git libcurl4-openssl-dev curl libssl-dev
          install-recommends: false

      - name: Start ClamAV daemon clamd
        uses: toblux/start-clamd-github-action@v0.2.1

      - name: Ping clamd on TCP port 3310
        run: echo PING | nc localhost 3310

      - name: Ping clamd using the Unix socket
        run: echo PING | nc -U /tmp/clamd.socket

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true
          cache-dependency-glob: |
            requirements_for_test.txt

      - name: Install application requirements (pip)
        run: uv pip install -r requirements_for_test.txt

      - uses: astral-sh/ruff-action@v3
        with:
          version-file: requirements_for_test.txt

      - name: Generate version file
        run: make generate-version-file

      - uses: pavelzw/pytest-action@v2
        with:
          job-summary: false
          verbose: false
          emoji: false
          custom-arguments: --junitxml=reports/pytest-unit.xml
          custom-pytest: uv run pytest

      - uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: PyTest Tests
          path: reports/pytest-*.xml
          reporter: java-junit
          only-summary: true
          use-actions-summary: false
          badge-title: PYTEST
